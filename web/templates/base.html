<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event Logger{% endblock %} - DirXML Event Browser</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --orange: #db6d28;
            --purple: #bc8cff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav .logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            text-decoration: none;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.25rem 0;
        }

        nav a:hover, nav a.active {
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        h1, h2 {
            font-weight: 600;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.2rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        input[type="text"], input[type="date"], select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        button, .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, .btn:hover {
            opacity: 0.85;
        }

        .btn-secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr:hover {
            background: var(--surface2);
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-add { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-modify { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .badge-delete { background: rgba(248,81,73,0.15); color: var(--red); }
        .badge-sync { background: rgba(88,166,255,0.15); color: var(--accent); }
        .badge-rename { background: rgba(188,140,255,0.15); color: var(--purple); }
        .badge-move { background: rgba(219,109,40,0.15); color: var(--orange); }

        .mono {
            font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.8rem;
        }

        .json-view {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
            font-size: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .xml-view {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
            font-size: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .filter-bar label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        .pagination a {
            color: var(--accent);
            text-decoration: none;
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .pagination a:hover {
            background: var(--surface2);
        }

        .pagination .current {
            color: var(--text);
            padding: 0.25rem 0.75rem;
        }

        .dn-path {
            color: var(--text-muted);
            word-break: break-all;
        }

        .dn-path .dn-leaf {
            color: var(--text);
            font-weight: 600;
        }

        .change-row td {
            padding: 0.4rem 0.75rem;
        }

        .change-old {
            background: rgba(248,81,73,0.1);
            color: var(--red);
        }

        .change-new {
            background: rgba(63,185,80,0.1);
            color: var(--green);
        }

        .timeline-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        .dot-add { background: var(--green); }
        .dot-modify { background: var(--yellow); }
        .dot-delete { background: var(--red); }
        .dot-sync { background: var(--accent); }
        .dot-rename { background: var(--purple); }
        .dot-move { background: var(--orange); }

        .expandable {
            cursor: pointer;
            user-select: none;
        }

        .expandable:hover {
            color: var(--accent);
        }

        .expand-content {
            display: none;
        }

        .expand-content.show {
            display: table-row;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .autocomplete-list {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            width: 100%;
        }

        .autocomplete-list div {
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .autocomplete-list div:hover {
            background: var(--surface2);
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .nav-event {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .nav-event:hover {
            color: var(--accent);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            font-size: 0.875rem;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">DirXML Event Browser</a>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
        <a href="/stats" {% if request.path == '/stats' %}class="active"{% endif %}>Dashboard</a>
        <a href="/search" {% if request.path == '/search' %}class="active"{% endif %}>Search</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleExpand(eventId) {
            const row = document.getElementById('expand-' + eventId);
            row.classList.toggle('show');
        }

        function switchTab(tabGroup, tabName) {
            document.querySelectorAll('.' + tabGroup + '-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.' + tabGroup + '-content').forEach(c => c.classList.remove('active'));
            document.querySelector('.' + tabGroup + '-tab-' + tabName).classList.add('active');
            document.querySelector('.' + tabGroup + '-content-' + tabName).classList.add('active');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
