{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<h1>Object Timeline</h1>
<p style="color: var(--text-muted); margin-bottom: 1.5rem;">
    Search for an object by its source DN to see a complete timeline of all events.
</p>

<div class="card">
    <form action="/timeline" method="get">
        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="dn-search" name="srcdn" placeholder="Start typing a DN..."
                       autocomplete="off" value="">
                <div id="autocomplete-results" class="autocomplete-list" style="display:none;"></div>
            </div>
            <button type="submit">View Timeline</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const input = document.getElementById('dn-search');
    const results = document.getElementById('autocomplete-results');
    let debounceTimer;

    input.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const q = this.value.trim();
        if (q.length < 2) {
            results.style.display = 'none';
            return;
        }
        debounceTimer = setTimeout(() => {
            fetch('/api/search-objects?q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(data => {
                    if (data.length === 0) {
                        results.style.display = 'none';
                        return;
                    }
                    results.innerHTML = data.map(dn =>
                        '<div onclick="selectDN(this)">' + escapeHtml(dn) + '</div>'
                    ).join('');
                    results.style.display = 'block';
                });
        }, 250);
    });

    function selectDN(el) {
        input.value = el.textContent;
        results.style.display = 'none';
    }

    document.addEventListener('click', function(e) {
        if (!results.contains(e.target) && e.target !== input) {
            results.style.display = 'none';
        }
    });

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
</script>
{% endblock %}
